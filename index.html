<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ BABAN_OFF ] | Digital Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    <style>
        :root {
            --bg: #030303;
            --orange: #FF8C00;
            --orange-glow: rgba(255, 140, 0, 0.5);
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #FFFFFF;
            --radius: 20px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #030303 100%);
        }

        /* Контейнер для партиклов */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            top: 0; left: 0;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 6%;
            position: fixed;
            width: 88%;
            z-index: 100;
            backdrop-filter: blur(10px);
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Bebas Neue';
            font-size: 2.2rem;
            color: var(--orange);
            text-decoration: none;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--orange-glow);
        }

        .nav-link {
            color: #ccc;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.7rem;
            font-weight: 700;
            margin-left: 30px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-link:hover { color: var(--orange); }

        /* Hero */
        .hero {
            height: 100vh;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            align-items: center;
            padding: 0 6%;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-family: 'Bebas Neue';
            font-size: clamp(4rem, 10vw, 8rem);
            line-height: 0.85;
            margin: 0 0 30px 0;
            text-transform: uppercase;
        }

        .highlight { 
            color: var(--orange); 
            text-shadow: 0 0 40px var(--orange-glow); 
            display: inline-block;
        }

        .offer-text {
            font-size: 1.1rem;
            color: #888;
            max-width: 500px;
            line-height: 1.6;
            margin-bottom: 50px;
            font-weight: 400;
            border-left: 2px solid var(--orange);
            padding-left: 20px;
        }

        .btn-group { display: flex; gap: 20px; }

        .btn-premium {
            padding: 18px 40px;
            font-family: 'Bebas Neue';
            font-size: 1.4rem;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: var(--radius);
            transition: 0.4s;
        }

        .btn-solid {
            background: var(--orange);
            color: #000;
            box-shadow: 0 10px 30px var(--orange-glow);
        }

        .btn-solid:hover { transform: scale(1.05); box-shadow: 0 15px 40px var(--orange-glow); }

        /* Иконки Софта */
        .soft-icon {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            position: absolute;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: float 4s ease-in-out infinite;
        }

        .ae { background: #2e004f; color: #cf96fd; top: -40px; right: 20px; }
        .pr { background: #001e36; color: #31a8ff; bottom: -30px; left: -20px; animation-delay: 2s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero-visual { position: relative; }

        .main-frame {
            width: 100%;
            aspect-ratio: 16/10;
            background: url('https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?q=80&w=2070&auto=format&fit=crop') center/cover;
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            position: relative;
        }

        /* Glass Bar */
        .stats-glass {
            position: absolute;
            bottom: 30px;
            left: 6%;
            width: 88%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            z-index: 10;
        }

        .stat-box {
            padding: 30px;
            text-align: center;
            border-right: 1px solid var(--glass-border);
        }

        .stat-val {
            font-family: 'Bebas Neue';
            font-size: 3rem;
            color: var(--orange);
            display: block;
        }

        .stat-desc {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 1100px) {
            .hero { grid-template-columns: 1fr; padding-top: 120px; text-align: center; height: auto; }
            .offer-text { margin: 0 auto 40px auto; border-left: none; border-top: 2px solid var(--orange); padding: 20px 0; }
            .btn-group { justify-content: center; }
            .stats-glass { grid-template-columns: 1fr 1fr; position: relative; left: 0; width: 100%; margin-top: 50px; }
            .soft-icon { display: none; }
        }
    </style>
</head>
<body>

<div id="particles-js"></div>

<header data-aos="fade-down">
    <a href="#" class="logo">BABAN_OFF</a>
    <nav>
        <a href="#" class="nav-link">Showreel</a>
        <a href="#" class="nav-link">Portfolio</a>
        <a href="#" class="nav-link">Contact</a>
    </nav>
</header>

<main class="hero">
    <div class="hero-content">
        <h1 data-aos="fade-up">
            ВАШ КОНТЕНТ — <br>ЭТО ВАША <span class="highlight">ВАЛЮТА</span>
        </h1>
        <p class="offer-text" data-aos="fade-up" data-aos-delay="200">
            Я превращаю пиксели в прибыль. Профессиональный Motion-дизайн и монтаж, который удерживает внимание и продает ваш бренд на автопилоте.
        </p>
        <div class="btn-group" data-aos="fade-up" data-aos-delay="400">
            <a href="#" class="btn-premium btn-solid">Начать проект</a>
            <a href="#" class="btn-premium" style="border: 1px solid #444; color: #fff;">Работы</a>
        </div>
    </div>

    <div class="hero-visual" data-aos="zoom-in" data-aos-delay="400">
        <div class="soft-icon ae">Ae</div>
        <div class="soft-icon pr">Pr</div>
        <div class="main-frame"></div>
    </div>
</main>

<div class="stats-glass" data-aos="fade-up" data-aos-delay="600">
    <div class="stat-box">
        <span class="stat-val">5 лет</span>
        <span class="stat-desc">Опыта</span>
    </div>
    <div class="stat-box">
        <span class="stat-val">150+</span>
        <span class="stat-desc">Проектов</span>
    </div>
    <div class="stat-box">
        <span class="stat-val">4K</span>
        <span class="stat-desc">Разрешение</span>
    </div>
    <div class="stat-box" style="border: none;">
        <span class="stat-val">TOP</span>
        <span class="stat-desc">Рейтинг</span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    /* Настройка партиклов */
    particlesJS('particles-js', {
        "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": "#ffffff" },
            "opacity": { "value": 0.2, "random": true },
            "size": { "value": 2, "random": true },
            "line_linked": { "enable": false },
            "move": { "enable": true, "speed": 1, "direction": "top", "random": true, "straight": false, "out_mode": "out" }
        }
    });
</script>

</body>
</html>
